name: Build Windows Binary

on:
  push:
    branches: [wsaeconnreset-fix, main, master]
    tags: ['v*']
  pull_request:
    branches: [wsaeconnreset-fix, main, master]

jobs:
  build-windows:
    name: Cross-compile Windows x64
    runs-on: ubuntu-latest

    env:
      VERSION: 2.2.1
      PATCH_VERSION: 2.2.1-wsaeconnreset1

    steps:
      - uses: actions/checkout@v4
        with:
          path: patch-repo

      - name: Install MinGW cross-compiler
        run: sudo apt-get update && sudo apt-get install -y mingw-w64 g++-mingw-w64-x86-64

      - name: Download iperf2 2.2.1 release tarball
        run: |
          curl -L "https://sourceforge.net/projects/iperf2/files/iperf-${VERSION}.tar.gz/download" \
            -o iperf-${VERSION}.tar.gz
          tar xzf iperf-${VERSION}.tar.gz

      - name: Apply WSAECONNRESET patch
        run: |
          cd iperf-${VERSION}
          patch -p1 < ../patch-repo/wsaeconnreset.patch

      - name: Configure for Windows x64
        run: |
          cd iperf-${VERSION}
          mkdir build-win64 && cd build-win64
          ../configure \
            --host=x86_64-w64-mingw32 \
            CFLAGS="-O2 -DHAVE_CLOCK_GETTIME=1" \
            CXXFLAGS="-O2 -DHAVE_CLOCK_GETTIME=1"

      - name: Build
        run: make -j$(nproc) -C iperf-${VERSION}/build-win64

      - name: Collect binary
        run: cp iperf-${VERSION}/build-win64/src/iperf.exe iperf-${PATCH_VERSION}-win64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iperf-windows-x64
          path: iperf-*-win64.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: iperf-*-win64.exe
          body: |
            ## iperf2 ${{ env.VERSION }} Windows build with WSAECONNRESET fix

            Fixes Windows UDP server becoming unusable after first client disconnects.

            **Changes from upstream ${{ env.VERSION }}:**
            - `WSAIoctl(SIO_UDP_CONNRESET)` applied on UDP socket creation in server and client
            - `FATALUDPREADERR` updated to exclude `WSAECONNRESET` as a safety net
            - `#include <mstcpip.h>` + fallback `#define SIO_UDP_CONNRESET` in headers

            See [upstream bug report](https://sourceforge.net/p/iperf2/tickets/) and
            [Microsoft KB 263823](https://learn.microsoft.com/en-us/windows/win32/winsock/winsock-ioctls).
